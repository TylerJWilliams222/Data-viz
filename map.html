<!DOCTYPE html>
<html lang="en">
<head>
	<!--

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leaflet Map Basics</title>
    <link rel="stylesheet" href="leaflet/leaflet@1.9.4.css"/>
    <script src="leaflet/leaflet@1.9.4.js"></script>
    <style>
		html, body, #map,
		.leaflet-container {
			height: 100%;
			width: 100%;
			max-width: 100%;
			max-height: 100%;
            margin:0px;
		}
        #sidebar{
			position:absolute; 
			display:none;
			top:0px; 
			width:300px; 
			right:0px;
			background-color:white; 
			height:100vh; 
			z-index:700; /*change to 10000 to hide attribution*/
		}
		#sidebar div{
			padding:10px;
		}
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar"></div>
    <script>
    
	// INITIALISE THE MAP

	// Create a new map object and set a default starting point
	const start = [51.424808, -0.566745]
	const startZoom = 20; // how zoomed in
	const map = L.map('map').setView(start, startZoom);

	// Make the map run run with openstreetmap
	L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);




	// ADD A CLICK EVENT TO THE MAP
	const popup = L.popup();
	map.on('click', MapClick);
	function MapClick(e) {
		popup.setLatLng(e.latlng)
			 .setContent(`${e.latlng.toString()}`)
			 .openOn(map);
	}

	// CREATE A POPUP SIDEBAR
	let sidebar = document.getElementById("sidebar");
	sidebar.onclick = hideSidebar; 

	function ShowSidebar(e) {
		console.log(e); 
		sidebar.innerHTML = e.target.options.sidebarText;
		sidebar.style.display = "block";
	}
	function hideSidebar() {
		sidebar.style.display = "none";
	}
	const circle2 = L.circle([51.482576, -0.08176], {
		color: 'green',
		fillColor: 'green',
		fillOpacity: 0.5,
		radius: 500,
		sidebarText: "<div>Hello!!</div>"
	}).addTo(map).on('click', ShowSidebar);

    // LOAD EXTERNAL DATA
    fetch('data/markers.json')
    .then(response => response.json())
    .then(data => {
        data.forEach(location => {
            L.marker([location.lat, location.lng]).addTo(map).bindPopup(location.popup);
        });
    })
    .catch(error => console.error('Error loading markers:', error));
    </script>
</body>
</html>
