<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leaflet Map Basics</title>
    <link rel="stylesheet" href="leaflet/leaflet@1.9.4.css"/>
    <script src="leaflet/leaflet@1.9.4.js"></script>
    <style>
		html, body, #map, 
		.leaflet-container {
			height: 100%;
			width: 100%;
			max-width: 100%;
			max-height: 100%;
            margin:0px;
		}
        #sidebar{
			position:absolute; 
			display:none;
			top:0px; 
			width:300px; 
			right:0px;
			background-color:rgb(255, 255, 255); 
			height:100vh; 
			z-index:1000; 
		}
		#sidebar div{
			padding:100px;
		}
		.leaflet-popup-content {
			margin: 12px 16px;
		}
		.vending-popup img {
			display: block;
			max-width: 240px;
			max-height: 180px;
			width: auto;
			height: auto;
			object-fit: contain;
			border-radius: 5px;
			margin-top: 10px;
		}
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar"></div>
    <script>
    
	// INITIALISE THE MAP

	// Define map bounds - NW, NE, SW, SE coordinates
	const bounds = [
		[51.4176, -0.5855], // Southwest corner (lat, lng)
		[51.4328, -0.5395]  // Northeast corner (lat, lng)
	];

	// Create a new map object and set a default starting point
	const start = [51.4252, -0.5625]
	const startZoom = 15; // how zoomed in
	const map = L.map('map', {
		maxBounds: bounds,
		maxBoundsViscosity: 1.0, // Prevents panning outside bounds
		minZoom: 15 // Restrict zoom out to level 15
	}).setView(start, startZoom);

	// Set the maximum bounds to crop the map
	map.setMaxBounds(bounds);

	// Make the map run run with openstreetmap
	L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 50,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);




	// ADD A CLICK EVENT TO THE MAP
	const popup = L.popup();
	map.on('click', MapClick);
	function MapClick(e) {
		popup.setLatLng(e.latlng)
			 .setContent(`${e.latlng.toString()}`)
			 .openOn(map);
	}
	popup.options.autoPan = true;
	popup.options.keepInView = true;
	popup.options.autoPanPadding = [60, 60];

	// CREATE A POPUP SIDEBAR
	let sidebar = document.getElementById("sidebar");
	sidebar.onclick = hideSidebar; 

	function ShowSidebar(e) {
		console.log(e); 
		sidebar.innerHTML = e.target.options.sidebarText;
		sidebar.style.display = "block";
	}
	function hideSidebar() {
		sidebar.style.display = "none";
	}
	const circle2 = L.circle([51.482576, -0.08176], {
		color: 'green',
		fillColor: 'green',
		fillOpacity: 0.5,
		radius: 500,
		sidebarText: "<div>Hello!!</div>"
	}).addTo(map).on('click', ShowSidebar);

    // LOAD EXTERNAL DATA
    fetch('data/markers.json')
    .then(response => response.json())
    .then(data => {
        data.forEach(location => {
            let popupContent = `<div><p>${location.popup}</p>`;
            if (location.image) {
				popupContent += `<img src="leaflet/images/${location.image}" alt="${location.popup}">`;
            }
            popupContent += `</div>`;
			L.marker([location.lat, location.lng]).addTo(map).bindPopup(popupContent, {
				autoPan: true,
				keepInView: true,
				autoPanPadding: [60, 60],
				className: 'vending-popup'
			});
        });
    })
    .catch(error => console.error('Error loading markers:', error));
    </script>
</body>
</html>
